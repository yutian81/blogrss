name: Upstream Sync

permissions:
  contents: write
  actions: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream safely
        run: |
          # 备份你的配置文件（关键！）
          cp conf.yaml conf.yaml.tmp
          
          # 同步上游
          git remote add upstream https://github.com/willow-god/Friend-Circle-Lite.git
          git fetch upstream
          
          # 安全合并，不丢失文件
          git checkout main
          git merge upstream/main --no-commit --no-ff
          
          # 强制恢复你的配置文件
          cp conf.yaml.tmp conf.yaml
          rm -f conf.yaml.tmp
          
          # 提交并推送
          git add .
          git commit -m "Sync from upstream $(date '+%Y-%m-%d')"
          git push origin main
